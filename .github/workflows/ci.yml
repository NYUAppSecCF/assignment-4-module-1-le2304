name: C/C++ CI

on:
  push:
    branches: [ $default-branch, main ]
  pull_request:
    branches: [ $default-branch ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Build with Gradle
      run: |
        cd ./GiftcardSite
        chmod +x ./gradlew
        ./gradlew build
